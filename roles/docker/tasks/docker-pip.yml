---
- name: Install docker-py module
  ansible.builtin.pip:
    name:
      - docker-py
    state: present
    extra_args: "--no-cache-dir --index-url {{ docker_pip_index_url }} --break-system-packages"
  when:
    - ansible_python_version is version('2.6', '<=')

- name: Install docker module
  ansible.builtin.pip:
    name:
      - docker
    state: present
    extra_args: "--no-cache-dir --index-url {{ docker_pip_index_url }} --break-system-packages"
  when:
    - ansible_python_version is version('2.6', '>')
